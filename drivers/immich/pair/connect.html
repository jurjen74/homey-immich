<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      padding: 24px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: #FABB2A;
      border-radius: 50%;
      padding: 14px;
    }

    h2 { text-align: center; font-size: 18px; font-weight: 600; margin-bottom: 6px; }

    .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 13px; }

    label { display: block; font-weight: 500; margin-bottom: 4px; color: #333; }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }

    input:focus { border-color: #FABB2A; }
    input.error { border-color: #ef4444; }
    input.success { border-color: #22c55e; }

    .hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 14px; }

    .status-box {
      display: none;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .status-box.error { display: block; background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c; }
    .status-box.success { display: block; background: #f0fdf4; border: 1px solid #86efac; color: #15803d; }

    .actions { display: flex; gap: 10px; margin-top: 4px; }

    button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btn-test { background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; }
    #btn-test:not(:disabled):hover { background: #e5e7eb; }

    #btn-next { background: #FABB2A; color: #fff; }
    #btn-next:not(:disabled):hover { background: #e0a820; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="width:100%;height:100%">
      <path fill="#fff" d="M238.8 155.5c33.5 29.7 60.5 61.5 77.9 91.5 29.9-53.4 49.8-116.9 50.1-157.3v-.8c0-59.8-59.7-83.1-111.1-83.1S144.6 29 144.6 88.8V92c28.7 12.8 62.6 35.6 94.2 63.5"/>
      <path fill="#fff" d="M55.9 318.6c21-23.3 53.1-48.6 89.4-69.9 38.6-22.7 77.2-38.6 111.1-45.8-41.6-44.9-95.8-83.5-134.1-96.2-.3-.1-.5-.2-.7-.2-57-18.7-97.6 30.9-113.5 79.8S-4.1 299.1 52.8 317.6c.8.2 1.8.6 3.1 1"/>
      <path fill="#fff" d="M503.9 185.4C488 136.6 447.4 87 390.5 105.5c-.8.3-1.8.6-3.1 1-3.3 31.2-14.4 70.5-31.2 109.1-17.9 41.1-39.8 76.6-62.9 102.4 60 11.9 126.5 11.3 165.1-1 .3-.1.5-.2.7-.2 57-18.6 60.6-82.5 44.8-131.4"/>
      <path fill="#fff" d="M205 366.3c-9.7-43.7-12.8-85.3-9.3-119.8-55.5 25.7-109 65.3-133 97.8-.2.2-.3.4-.5.6-35.2 48.4-.6 102.3 41 132.5s103.5 46.4 138.7-1.9c.5-.7 1.1-1.5 1.9-2.6-15.6-27.1-29.7-65.5-38.8-106.6"/>
      <path fill="#fff" d="M448.8 341.9c-30.7 6.5-71.5 8.1-113.4 4-44.6-4.3-85.1-14.2-116.8-28.2 7.2 60.8 28.4 123.8 51.9 156.7.2.2.3.4.5.6 35.2 48.4 97.1 32.2 138.7 1.9 41.6-30.2 76.2-84.1 41-132.5-.5-.6-1.1-1.4-1.9-2.5"/>
    </svg>
  </div>
  <h2 id="title"></h2>
  <p class="subtitle" id="subtitle"></p>

  <label for="url" id="label-url"></label>
  <input id="url" type="text" autocomplete="off" spellcheck="false" />
  <p class="hint" id="hint-url"></p>

  <label for="apiKey" id="label-apikey"></label>
  <input id="apiKey" type="password" autocomplete="off" />
  <p class="hint" id="hint-apikey"></p>

  <div id="status" class="status-box"></div>

  <div class="actions">
    <button id="btn-test" type="button"></button>
    <button id="btn-next" type="button" disabled></button>
  </div>

  <script>
    const urlInput  = document.getElementById('url');
    const keyInput  = document.getElementById('apiKey');
    const statusBox = document.getElementById('status');
    const btnTest   = document.getElementById('btn-test');
    const btnNext   = document.getElementById('btn-next');

    document.getElementById('title').textContent        = Homey.__('pair.connect.title');
    document.getElementById('subtitle').textContent     = Homey.__('pair.connect.subtitle');
    document.getElementById('label-url').textContent    = Homey.__('pair.connect.label_url');
    document.getElementById('hint-url').textContent     = Homey.__('pair.connect.hint_url');
    document.getElementById('label-apikey').textContent = Homey.__('pair.connect.label_apikey');
    document.getElementById('hint-apikey').textContent  = Homey.__('pair.connect.hint_apikey');
    urlInput.placeholder                                = Homey.__('pair.connect.placeholder_url');
    keyInput.placeholder                                = Homey.__('pair.connect.placeholder_apikey');
    btnTest.textContent                                 = Homey.__('pair.connect.btn_test');
    btnNext.textContent                                 = Homey.__('pair.connect.btn_next');

    function setStatus(type, msg) {
      statusBox.className = 'status-box ' + type;
      statusBox.textContent = msg;
    }
    function clearStatus() { statusBox.className = 'status-box'; statusBox.textContent = ''; }

    function setInputState(el, state) {
      el.classList.remove('error', 'success');
      if (state) el.classList.add(state);
    }

    function setLoading(loading) {
      btnTest.disabled = loading;
      btnTest.innerHTML = loading
        ? '<span class="spinner"></span>' + Homey.__('pair.connect.btn_testing')
        : Homey.__('pair.connect.btn_test');
    }

    async function testConnection() {
      const url    = urlInput.value.trim();
      const apiKey = keyInput.value.trim();

      if (!url) {
        setInputState(urlInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_url_required'));
        urlInput.focus();
        return;
      }
      if (!apiKey) {
        setInputState(keyInput, 'error');
        setStatus('error', Homey.__('pair.connect.error_apikey_required'));
        keyInput.focus();
        return;
      }

      clearStatus();
      setInputState(urlInput, null);
      setInputState(keyInput, null);
      btnNext.disabled = true;
      setLoading(true);

      try {
        const result = await Homey.emit('test_connection', { url, apiKey });
        setInputState(urlInput, 'success');
        setInputState(keyInput, 'success');
        setStatus('success', Homey.__('pair.connect.success_connected').replace('{version}', result.version));
        btnNext.disabled = false;
      } catch (err) {
        setInputState(urlInput, 'error');
        setInputState(keyInput, 'error');
        setStatus('error', err.message || Homey.__('pair.connect.error_connection_failed'));
        btnNext.disabled = true;
      } finally {
        setLoading(false);
      }
    }

    btnTest.addEventListener('click', testConnection);
    btnNext.addEventListener('click', () => Homey.nextView());
    keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') testConnection(); });

    function onInputChange() {
      btnNext.disabled = true;
      setInputState(urlInput, null);
      setInputState(keyInput, null);
      clearStatus();
    }
    urlInput.addEventListener('input', onInputChange);
    keyInput.addEventListener('input', onInputChange);
  </script>
</body>
</html>
