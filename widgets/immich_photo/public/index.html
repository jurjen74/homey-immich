<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: transparent; }

    #wrapper {
      position: relative;
      width: 100%;
      overflow: hidden;
      background-color: #111;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }
    #wrapper.fit-contain { background-size: contain; }

    #meta {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      padding: 14px 14px 16px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      color: #fff;
      transition: opacity 0.3s;
    }
    #meta.hidden { opacity: 0; }

    #filename {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #taken-at {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    #state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.55);
      font-size: 13px;
      text-align: center;
      padding: var(--homey-su-3);
    }
    #state.hidden { display: none; }
  </style>
</head>

<body class="homey-widget">
  <div id="wrapper">
    <div id="state">Loading…</div>
    <div id="meta" class="hidden">
      <div id="filename"></div>
      <div id="taken-at"></div>
    </div>
  </div>

  <script type="text/javascript">
    function onHomeyReady(Homey) {
      Homey.ready();

      const wrapperEl  = document.getElementById('wrapper');
      const metaEl     = document.getElementById('meta');
      const filenameEl = document.getElementById('filename');
      const takenAtEl  = document.getElementById('taken-at');
      const stateEl    = document.getElementById('state');

      const ASPECT_RATIOS = {
        square:    1 / 1,
        landscape: 2 / 3,
        wide:      9 / 16,
        portrait:  3 / 2,
        tall:      16 / 9,
      };

      let refreshTimer = null;

      function applyLayout() {
        const settings = Homey.getSettings() || {};
        const ratio = ASPECT_RATIOS[settings.aspect] || ASPECT_RATIOS.landscape;
        const width = wrapperEl.getBoundingClientRect().width || 300;
        const height = Math.max(120, Math.round(width * ratio));
        wrapperEl.style.height = height + 'px';
        Homey.setHeight(height);

        wrapperEl.classList.toggle('fit-contain', settings.fit === 'contain');
      }

      function showState(msg) {
        stateEl.textContent = msg;
        stateEl.classList.remove('hidden');
        metaEl.classList.add('hidden');
      }

      function hideState() {
        stateEl.classList.add('hidden');
      }

      async function loadPhoto() {
        const settings = Homey.getSettings() || {};
        const deviceIds = Homey.getDeviceIds() || [];
        const deviceId = deviceIds[0];

        if (!deviceId) {
          showState('No device');
          return;
        }

        const mode = settings.mode || 'random';
        const albumId = (settings.album && settings.album.id) || '';

        try {
          const photo = await Homey.api(
            'GET',
            '/photo?mode=' + encodeURIComponent(mode)
              + '&deviceId=' + encodeURIComponent(deviceId)
              + '&albumId=' + encodeURIComponent(albumId),
            null,
          );

          wrapperEl.style.backgroundImage = "url('" + photo.src + "')";
          hideState();

          if (settings.show_metadata !== false) {
            filenameEl.textContent = photo.filename || '';
            if (photo.takenAt) {
              const d = new Date(photo.takenAt);
              takenAtEl.textContent = isNaN(d) ? '' : d.toLocaleDateString(undefined, {
                year: 'numeric', month: 'long', day: 'numeric',
              });
            } else {
              takenAtEl.textContent = '';
            }
            metaEl.classList.remove('hidden');
          } else {
            metaEl.classList.add('hidden');
          }
        } catch (err) {
          showState(err.message || 'Could not load photo');
        }
      }

      function schedule() {
        if (refreshTimer) clearTimeout(refreshTimer);
        const settings = Homey.getSettings() || {};
        const ms = Math.max(10, settings.refresh_interval || 60) * 1000;
        refreshTimer = setTimeout(function () {
          loadPhoto().finally(schedule);
        }, ms);
      }

      Homey.on('settings.set', function () {
        applyLayout();
        loadPhoto();
      });

      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(applyLayout).observe(wrapperEl.parentElement || document.body);
      }

      applyLayout();
      loadPhoto().finally(schedule);
    }
  </script>
</body>
</html>
