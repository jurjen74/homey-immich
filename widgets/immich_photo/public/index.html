<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 220px;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #photo {
      width: 100%;
      height: 220px;
      position: relative;
      background: #111 center / cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #meta {
      padding: 10px 14px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.65));
      color: #fff;
      transition: opacity 0.4s;
    }

    #meta.hidden { opacity: 0; }

    #filename {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #taken-at {
      font-size: 11px;
      opacity: 0.65;
      margin-top: 2px;
    }

    #state {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }

    #state.visible { display: flex; }

    #device-picker {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      padding: 20px;
      z-index: 10;
    }

    #device-picker.visible { display: flex; }

    #device-picker p {
      color: rgba(255, 255, 255, 0.75);
      font-size: 12px;
      text-align: center;
    }

    #device-select {
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      font-size: 13px;
    }

    #device-confirm {
      padding: 7px 20px;
      background: #4A3800;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    #device-confirm:hover { background: #5e4800; }
  </style>
</head>
<body>
  <div id="photo">
    <div id="meta" class="hidden">
      <div id="filename"></div>
      <div id="taken-at"></div>
    </div>
    <div id="state"></div>
    <div id="device-picker">
      <p>Select an Immich device</p>
      <select id="device-select"></select>
      <button id="device-confirm">Confirm</button>
    </div>
  </div>

  <script>
    var settings = {};
    var refreshTimer = null;
    var storedDeviceId = null;

    var photoEl    = document.getElementById('photo');
    var metaEl     = document.getElementById('meta');
    var filenameEl = document.getElementById('filename');
    var takenAtEl  = document.getElementById('taken-at');
    var stateEl    = document.getElementById('state');
    var pickerEl   = document.getElementById('device-picker');
    var selectEl   = document.getElementById('device-select');
    var confirmEl  = document.getElementById('device-confirm');

    var STORAGE_KEY = 'immich_photo_device_id';

    function showState(msg) {
      stateEl.textContent = msg;
      stateEl.classList.add('visible');
      metaEl.classList.add('hidden');
      photoEl.style.backgroundImage = '';
    }

    function hideState() {
      stateEl.classList.remove('visible');
    }

    function getDeviceId() {
      return (settings.device && settings.device.id) ||
             storedDeviceId ||
             localStorage.getItem(STORAGE_KEY);
    }

    function showDevicePicker(resolve) {
      showState('');
      Homey.api('GET', '/devices').then(function (devices) {
        if (!devices || devices.length === 0) {
          pickerEl.classList.remove('visible');
          showState('No Immich devices found');
          resolve(null);
          return;
        }

        selectEl.innerHTML = devices.map(function (d) {
          return '<option value="' + d.id + '">' + d.name + '</option>';
        }).join('');

        pickerEl.classList.add('visible');

        confirmEl.onclick = function () {
          var id = selectEl.value;
          localStorage.setItem(STORAGE_KEY, id);
          storedDeviceId = id;
          pickerEl.classList.remove('visible');
          resolve(id);
        };
      }).catch(function () {
        pickerEl.classList.remove('visible');
        showState('Could not load devices');
        resolve(null);
      });
    }

    function ensureDevice() {
      return new Promise(function (resolve) {
        var id = getDeviceId();
        if (id) { resolve(id); return; }
        showDevicePicker(resolve);
      });
    }

    function loadPhoto() {
      return ensureDevice().then(function (deviceId) {
        if (!deviceId) return;

        var mode = settings.mode || 'random';

        return Homey.api(
          'GET',
          '/photo?mode=' + encodeURIComponent(mode) + '&deviceId=' + encodeURIComponent(deviceId),
          {},
        ).then(function (photo) {
          photoEl.style.backgroundImage = "url('" + photo.src + "')";
          hideState();

          if (settings.show_metadata !== false) {
            filenameEl.textContent = photo.filename || '';
            if (photo.takenAt) {
              var d = new Date(photo.takenAt);
              takenAtEl.textContent = isNaN(d) ? '' : d.toLocaleDateString(undefined, {
                year: 'numeric', month: 'long', day: 'numeric',
              });
            } else {
              takenAtEl.textContent = '';
            }
            metaEl.classList.remove('hidden');
          } else {
            metaEl.classList.add('hidden');
          }
        }).catch(function (err) {
          showState(err.message || 'Could not load photo');
        });
      });
    }

    function scheduleNext() {
      if (refreshTimer) clearTimeout(refreshTimer);
      var ms = Math.max(10, (settings.refresh_interval || 60)) * 1000;
      refreshTimer = setTimeout(function () {
        loadPhoto().then(scheduleNext).catch(scheduleNext);
      }, ms);
    }

    Homey.ready(function () {
      Homey.getSettings().then(function (s) {
        settings = s || {};
        showState('Loading…');
        loadPhoto().then(scheduleNext).catch(scheduleNext);
      }).catch(function () {
        showState('Could not load settings');
      });
    });
  </script>
</body>
</html>
